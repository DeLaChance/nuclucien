apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: default
  labels:
    app: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate # Prevents two pods from writing to the same PVC simultaneously
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000" # Change to match your host's user ID if using local storage
            - name: PGID
              value: "1000" # Change to match your host's group ID
            - name: TZ
              value: "Etc/UTC" # Set your local timezone (e.g., "America/New_York")
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - name: webui
              containerPort: 8080
              protocol: TCP
            - name: torrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: qbittorrent-storage
              mountPath: /config
              subPath: config/qbitorrent
            - name: qbittorrent-storage
              mountPath: /downloads
              subPath: downloads
            - name: qbittorrent-storage
              mountPath: /tv
              subPath: tv
            - name: qbittorrent-storage
              mountPath: /films
              subPath: films
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: qbittorrent-storage
          persistentVolumeClaim:
            claimName: media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-service
  namespace: default
spec:
  type: NodePort 
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: 8080
      nodePort: 32080
      protocol: TCP
    - name: torrent-tcp
      port: 6881
      targetPort: 6881
      nodePort: 32081
      protocol: TCP
    - name: torrent-udp
      port: 6881
      targetPort: 6881
      nodePort: 32081
      protocol: UDP
