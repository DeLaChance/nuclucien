apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-shared-pv
spec:
  capacity:
    storage: 200Gi 
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /home/lucien/media 
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - nuclucien
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc 
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  volumeName: media-shared-pv  
  resources:
    requests:
      storage: 200Gi                
